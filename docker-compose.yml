##############################################################################
# INFRAESTRUCTURA BASE — solo servicios de datos (postgres + redis)
#
# Útil para desarrollo local SIN Docker para la app (Next.js corre en el host):
#   docker compose up -d
#   npm run dev
#
# Para desarrollo completo en Docker usar:
#   docker compose -f docker-compose.dev.yml up --build
#
# Para producción usar:
#   docker compose -f docker-compose.prod.yml up -d --build
##############################################################################

services:

  postgres:
    image: postgres:15-alpine
    container_name: tickets-postgres
    environment:
      POSTGRES_DB: tickets_db
      POSTGRES_USER: tickets_user
      POSTGRES_PASSWORD: tickets_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tickets-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets_user -d tickets_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: tickets-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tickets-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  tickets-network:
    driver: bridge
