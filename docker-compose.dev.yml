services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: tickets-app-dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://tickets_user:tickets_password_2024@postgres:5432/tickets_db
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STORAGE_PROVIDER: local
      STORAGE_LOCAL_UPLOAD_PATH: ./uploads
      STORAGE_LOCAL_PUBLIC_PATH: /uploads
      LOG_LEVEL: DEBUG
    volumes:
      # Montar código fuente para hot-reload
      - .:/app
      # Preservar node_modules del contenedor (Linux) — NO usar el del host (macOS)
      - dev_node_modules:/app/node_modules
      # Preservar .next del contenedor
      - dev_next:/app/.next
    ports:
      - '3000:3000'
    networks:
      - tickets-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: tickets-postgres-dev
    environment:
      POSTGRES_DB: tickets_db
      POSTGRES_USER: tickets_user
      POSTGRES_PASSWORD: tickets_password_2024
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - tickets-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets_user -d tickets_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: tickets-redis-dev
    ports:
      - '6379:6379'
    networks:
      - tickets-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data_dev:
  dev_node_modules:
  dev_next:

networks:
  tickets-network:
    driver: bridge
