##############################################################################
# DESARROLLO — hot-reload, volúmenes montados, sin build de producción
#
# Uso:
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.dev.yml up          # sin reconstruir
#   docker compose -f docker-compose.dev.yml down -v     # destruir todo
##############################################################################

services:

  # ── Base de datos ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: tickets-postgres-dev
    environment:
      POSTGRES_DB: tickets_db
      POSTGRES_USER: tickets_user
      POSTGRES_PASSWORD: tickets_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - tickets-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets_user -d tickets_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tickets-redis-dev
    ports:
      - "6379:6379"
    networks:
      - tickets-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Aplicación Next.js (dev con hot-reload) ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: tickets-app-dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://tickets_user:tickets_password_2024@postgres:5432/tickets_db
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-MGZykJSDK3DDnCTMh5w0bJ5+7+syOXYW64Z0IAzwczk=}
      UPLOAD_DIR: /app/public/uploads
      LOG_LEVEL: DEBUG
      # Turbopack — hot-reload más rápido
      TURBOPACK: 1
    volumes:
      # Código fuente montado — cualquier cambio se refleja al instante
      - .:/app
      # node_modules del contenedor (Linux) — NO sobreescribir con el del host (macOS)
      - dev_node_modules:/app/node_modules
      # Caché de Next.js — persiste entre reinicios para builds más rápidos
      - dev_next_cache:/app/.next
    ports:
      - "3000:3000"
    networks:
      - tickets-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Sin healthcheck en dev — evita que nginx espere y bloquee el arranque
    # El app tarda ~30s en compilar la primera vez

  # ── Nginx (proxy reverso local con HTTPS) ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tickets-nginx-dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.local.conf:/etc/nginx/nginx.conf:ro
      - ./public/uploads:/var/www/uploads:ro
      - ./docker/certs:/etc/nginx/certs:ro
    networks:
      - tickets-network
    depends_on:
      - app
    restart: unless-stopped

# ── Volúmenes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data_dev:
  dev_node_modules:
  dev_next_cache:

# ── Red ────────────────────────────────────────────────────────────────────────
networks:
  tickets-network:
    driver: bridge
