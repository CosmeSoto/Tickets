##############################################################################
# PRODUCCIÓN — imagen compilada, migraciones automáticas, nginx con SSL
#
# Requisitos previos:
#   cp .env.example .env.production   # y rellenar los valores reales
#
# Uso:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml pull && \
#     docker compose -f docker-compose.prod.yml up -d   # actualizar sin downtime
#   docker compose -f docker-compose.prod.yml down      # parar (datos persisten)
#   docker compose -f docker-compose.prod.yml down -v   # parar + borrar datos
##############################################################################

services:

  # ── Base de datos ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: tickets-postgres
    environment:
      POSTGRES_DB: tickets_db
      POSTGRES_USER: tickets_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requerida}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tickets-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets_user -d tickets_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tickets-redis
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - tickets-network
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Aplicación Next.js ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Solo NEXTAUTH_URL se necesita en build time para rutas absolutas
        NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL requerida}
    container_name: tickets-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://tickets_user:${DB_PASSWORD}@postgres:5432/tickets_db
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET requerida}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY requerida}
      UPLOAD_DIR: /app/public/uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Email (opcional)
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      # OAuth (opcional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID:-}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET:-}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID:-common}
    volumes:
      - app_uploads:/app/public/uploads
      - app_logs:/app/logs
    networks:
      - tickets-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Nginx (proxy reverso + SSL) ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tickets-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - app_uploads:/var/www/uploads:ro
      # Certificados SSL — montar desde el host o usar certbot
      - ${SSL_CERT_PATH:-./docker/certs}:/etc/nginx/ssl:ro
    networks:
      - tickets-network
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

# ── Volúmenes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  app_uploads:
  app_logs:

# ── Red ────────────────────────────────────────────────────────────────────────
networks:
  tickets-network:
    driver: bridge
